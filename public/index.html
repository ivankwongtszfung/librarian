<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Librarian</title>
<style>
  :root {
    --bg: #F7F8F5; --surface: #FFFFFF; --ink: #1B231E; --muted: #5C665F;
    --line: #DDE2DB; --green: #1B7A4A; --green-ink: #14603A; --green-soft: #E7F1E9;
    --red: #BC4438; --red-soft: #F7EAE8; --amber: #A87614; --amber-soft: #F5EEDC;
    --code-bg: #EEF1EC;
    --sans: "Avenir Next", Avenir, "Helvetica Neue", system-ui, sans-serif;
    --serif: Charter, "Bitstream Charter", Cambria, Georgia, serif;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #11160F; --surface: #181F16; --ink: #E4EAE2; --muted: #93A093;
      --line: #2A342A; --green: #4CBE7E; --green-ink: #6FD79C; --green-soft: #1A2B1F;
      --red: #E07A6C; --red-soft: #2E1D1A; --amber: #D9AE55; --amber-soft: #2B2415;
      --code-bg: #212A1F;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: var(--serif); line-height: 1.6;
  }
  header {
    position: sticky; top: 0; z-index: 10;
    background: var(--bg); border-bottom: 1px solid var(--line);
    padding: 0.9rem 1.25rem; display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;
  }
  .brand {
    font-family: var(--sans); font-weight: 700; font-size: 1.05rem; letter-spacing: -0.01em;
    display: flex; align-items: center; gap: 0.5rem; cursor: pointer;
  }
  .brand span { color: var(--muted); font-weight: 400; font-size: 0.8rem; }
  input[type=search] {
    flex: 1; min-width: 180px; padding: 0.45rem 0.7rem;
    border: 1px solid var(--line); border-radius: 7px;
    background: var(--surface); color: var(--ink); font: inherit; font-size: 0.9rem;
  }
  input:focus-visible, button:focus-visible { outline: 2px solid var(--green); outline-offset: 1px; }
  .filters { display: flex; gap: 0.4rem; flex-wrap: wrap; }
  .filters button {
    font-family: var(--mono); font-size: 0.72rem; padding: 0.3rem 0.65rem;
    border: 1px solid var(--line); border-radius: 999px;
    background: var(--surface); color: var(--muted); cursor: pointer;
  }
  .filters button.on { border-color: var(--green); color: var(--green-ink); background: var(--green-soft); }
  main { max-width: 62rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem; }

  .card {
    display: block; text-decoration: none; color: inherit;
    background: var(--surface); border: 1px solid var(--line);
    border-left: 3px solid var(--line); border-radius: 8px;
    padding: 0.85rem 1rem; margin-bottom: 0.7rem;
  }
  .card:hover { border-color: var(--muted); }
  .card.pending { border-left-color: var(--amber); }
  .card.approved { border-left-color: var(--green); }
  .card.rejected { border-left-color: var(--red); }
  .card.changes_requested { border-left-color: var(--amber); }
  .card h3 { font-family: var(--sans); font-size: 1rem; margin: 0 0 0.3rem; }
  .meta { display: flex; gap: 0.4rem; flex-wrap: wrap; align-items: center;
          font-family: var(--mono); font-size: 0.7rem; color: var(--muted); }
  .chip { padding: 0.15rem 0.5rem; border-radius: 999px; border: 1px solid var(--line); }
  .chip.pending { color: var(--amber); border-color: var(--amber); background: var(--amber-soft); }
  .chip.approved { color: var(--green-ink); border-color: var(--green); background: var(--green-soft); }
  .chip.rejected { color: var(--red); border-color: var(--red); background: var(--red-soft); }
  .chip.changes_requested { color: var(--amber); border-color: var(--amber); background: var(--amber-soft); }
  .reason { margin-top: 0.4rem; font-size: 0.88rem; color: var(--red); }
  .section-title {
    font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); margin: 1.5rem 0 0.7rem;
  }
  .section-title:first-child { margin-top: 0; }
  .empty { color: var(--muted); font-style: italic; padding: 2rem 0; }

  /* detail */
  .doc { background: var(--surface); border: 1px solid var(--line); border-radius: 8px; padding: 2rem 2.2rem; }
  /* Editorial reading measure: prose stays ~65ch; tables and code may run wide. */
  .doc > p, .doc > ul, .doc > ol, .doc > blockquote, .doc > h1, .doc > h2, .doc > h3 { max-width: 46rem; }
  .doc pre { background: var(--code-bg); padding: 0.9rem; border-radius: 6px; overflow-x: auto; font-size: 0.82rem; }
  .doc pre.mermaid { background: none; text-align: center; }
  .doc pre.mermaid svg { max-width: 100%; height: auto; }
  .doc code { font-family: var(--mono); font-size: 0.85em; background: var(--code-bg); padding: 0.1em 0.3em; border-radius: 4px; }
  .doc pre code { background: none; padding: 0; }
  .doc h1, .doc h2, .doc h3 { font-family: var(--sans); line-height: 1.22; }
  .doc h1 { font-size: 1.7rem; letter-spacing: -0.015em; } .doc h2 { font-size: 1.15rem; margin-top: 2.2rem; }
  .doc > *:first-child { margin-top: 0; }
  .doc table { border-collapse: collapse; width: 100%; font-size: 0.9rem; font-variant-numeric: tabular-nums; }
  .doc th, .doc td { border: 1px solid var(--line); padding: 0.45rem 0.65rem; text-align: left; vertical-align: top; }
  .doc th { font-family: var(--sans); font-size: 0.72rem; letter-spacing: 0.05em; text-transform: uppercase; color: var(--muted); background: var(--code-bg); }
  .doc tbody tr:nth-child(even) { background: color-mix(in srgb, var(--code-bg) 45%, transparent); }
  .doc .tbl { overflow-x: auto; margin: 1rem 0; }
  .doc h1, .doc h2, .doc h3 { text-wrap: balance; }
  .doc h3 { font-size: 1.02rem; margin-top: 1.3rem; }
  .doc hr { border: 0; border-top: 1px solid var(--line); margin: 1.6rem 0; }
  .doc blockquote { margin: 1rem 0; padding: 0.15rem 0 0.15rem 0.9rem; border-left: 3px solid var(--green); color: var(--muted); }
  /* Semantic callouts: a quote led by ⛔/⚠️/✅ is a status, not a citation. */
  .doc blockquote.crit, .doc blockquote.warn, .doc blockquote.ok {
    padding: 0.65rem 1rem; border-radius: 0 8px 8px 0; color: var(--ink); font-family: var(--sans); font-size: 0.93rem;
  }
  .doc blockquote.crit { border-left-color: var(--red); background: var(--red-soft); }
  .doc blockquote.warn { border-left-color: var(--amber); background: var(--amber-soft); }
  .doc blockquote.ok { border-left-color: var(--green); background: var(--green-soft); }
  .doc ul, .doc ol { padding-left: 1.4rem; }
  .doc li { margin: 0.3rem 0; }
  .doc li::marker { color: var(--muted); font-family: var(--sans); font-size: 0.85em; }
  .doc a { color: var(--green-ink); }
  .banner {
    border-radius: 8px; padding: 0.8rem 1rem; margin-bottom: 1rem;
    font-family: var(--sans); font-size: 0.92rem;
  }
  .banner.approved { background: var(--green-soft); border: 1px solid var(--green); color: var(--green-ink); }
  .banner.rejected { background: var(--red-soft); border: 1px solid var(--red); color: var(--red); }
  .banner.pending, .banner.changes_requested { background: var(--amber-soft); border: 1px solid var(--amber); color: var(--amber); }
  .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; margin: 1.25rem 0; }
  .actions button {
    font-family: var(--sans); font-weight: 600; font-size: 0.9rem;
    padding: 0.55rem 1.1rem; border-radius: 8px; cursor: pointer; border: 1px solid;
  }
  .approve { background: var(--green); border-color: var(--green); color: #fff; }
  .reject { background: var(--red-soft); border-color: var(--red); color: var(--red); }
  .comment-btn { background: var(--surface); border-color: var(--line); color: var(--ink); }
  textarea {
    width: 100%; min-height: 5rem; padding: 0.6rem; font: inherit; font-size: 0.9rem;
    border: 1px solid var(--line); border-radius: 8px; background: var(--surface); color: var(--ink);
  }
  .thread { margin-top: 1.5rem; }
  .comment { background: var(--surface); border: 1px solid var(--line); border-radius: 8px;
             padding: 0.7rem 0.9rem; margin-bottom: 0.6rem; font-size: 0.92rem; }
  .comment .who { font-family: var(--mono); font-size: 0.7rem; color: var(--muted); margin-bottom: 0.25rem; }
  .comment blockquote { margin: 0 0 0.4rem; padding-left: 0.7rem; border-left: 2px solid var(--green);
                        color: var(--muted); font-size: 0.86rem; }
  .versions { display: flex; gap: 0.4rem; margin-bottom: 1rem; }
  .versions button { font-family: var(--mono); font-size: 0.75rem; padding: 0.25rem 0.6rem;
                     border: 1px solid var(--line); border-radius: 6px; background: var(--surface);
                     color: var(--muted); cursor: pointer; }
  .versions button.on { border-color: var(--green); color: var(--green-ink); background: var(--green-soft); }
  .diff { font-family: var(--mono); font-size: 0.78rem; white-space: pre; overflow-x: auto;
          background: var(--code-bg); border-radius: 8px; padding: 0.9rem; }
  .diff .add { color: var(--green-ink); }
  .diff .del { color: var(--red); }
  .diff .hunk { color: var(--muted); }
  a.back { font-family: var(--mono); font-size: 0.75rem; color: var(--muted); text-decoration: none; }

  /* per-project catchup strip */
  .topline { display: flex; gap: 0.5rem; flex-wrap: wrap; margin: 0 0 1rem; }
  .stat { background: var(--surface); border: 1px solid var(--line); border-radius: 10px;
          padding: 0.5rem 0.9rem; font-family: var(--sans); }
  .stat b { display: block; font-size: 1.25rem; line-height: 1.15; font-variant-numeric: tabular-nums; }
  .stat small { color: var(--muted); font-family: var(--mono); font-size: 0.65rem; }
  .stat.hot { border-color: var(--amber); background: var(--amber-soft); }
  .stat.hot b { color: var(--amber); }
  .stat.bad { border-color: var(--red); background: var(--red-soft); }
  .stat.bad b { color: var(--red); }

  /* chat bar: speak to the agent from wherever you're reading */
  body { padding-bottom: 76px; }
  .chat { position: fixed; left: 0; right: 0; bottom: 0; background: var(--surface); border-top: 1px solid var(--line); }
  .chat .row { max-width: 62rem; margin: 0 auto; padding: 0.75rem 1.25rem; display: flex; gap: 0.55rem; align-items: center; }
  .chat input { flex: 1; font: inherit; font-size: 0.9rem; color: var(--ink); background: var(--bg); border: 1px solid var(--line); border-radius: 8px; padding: 0.55rem 0.75rem; }
  .chat select { max-width: 12rem; font-family: var(--mono); font-size: 0.7rem; color: var(--muted); background: var(--bg); border: 1px solid var(--line); border-radius: 8px; padding: 0.5rem 0.35rem; }
  .chat button { font-family: var(--sans); font-weight: 600; font-size: 0.85rem; background: var(--green); color: #fff; border: 1px solid var(--green); border-radius: 8px; padding: 0.55rem 1rem; cursor: pointer; }
  .chat .st { font-family: var(--mono); font-size: 0.68rem; color: var(--muted); min-width: 6rem; text-align: right; }
  .chat .st.ok { color: var(--green-ink); }
  .chat .st.warn { color: var(--amber); }

  /* precise context: what the mouse pointed at, and any pasted screenshot */
  .chat .chips { max-width: 62rem; margin: 0 auto; padding: 0.55rem 1.25rem 0; display: flex; gap: 0.45rem; flex-wrap: wrap; }
  .chip-ctx { display: inline-flex; align-items: center; gap: 0.4rem; max-width: 34rem;
              font-family: var(--mono); font-size: 0.7rem; color: var(--muted);
              background: var(--green-soft); border: 1px solid var(--green); border-radius: 999px;
              padding: 0.22rem 0.5rem 0.22rem 0.6rem; }
  .chip-ctx b { color: var(--green-ink); font-weight: 600; white-space: nowrap; }
  .chip-ctx .q { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .chip-ctx img { height: 1.3rem; width: 1.9rem; object-fit: cover; border-radius: 3px; border: 1px solid var(--line); }
  .chip-ctx button { border: 0; background: none; color: var(--muted); cursor: pointer; font-size: 0.8rem; line-height: 1; padding: 0 0.1rem; }
  .chip-ctx button:hover { color: var(--red); }

  /* generated catchup briefing (the "Catch me up" button) */
  .cu-go { font-family: var(--mono); font-size: 0.65rem; letter-spacing: 0.03em; text-transform: uppercase;
           color: var(--green-ink); background: var(--green-soft); border: 1px solid var(--green);
           border-radius: 999px; padding: 0.2rem 0.6rem; cursor: pointer; margin-left: 0.4rem; }
  .cu-head { display: flex; align-items: baseline; gap: 0.75rem; flex-wrap: wrap; margin: 0 0 1rem; }
  .cu-head h1 { font-size: 1.4rem; margin: 0; }
  .cu-head .gen { font-family: var(--mono); font-size: 0.68rem; color: var(--muted); }
  .cu-actions { margin-left: auto; display: flex; gap: 0.4rem; }
  .cu-actions button, .cu-actions a { font-family: var(--mono); font-size: 0.7rem; padding: 0.3rem 0.65rem;
           border: 1px solid var(--line); border-radius: 999px; background: var(--surface); color: var(--muted);
           cursor: pointer; text-decoration: none; }
  .cu-now { border: 1px solid var(--amber); background: var(--amber-soft); border-radius: 12px;
            padding: 0.85rem 1.1rem; margin: 0 0 1rem; font-size: 0.95rem; }
  .cu-now.calm { border-color: var(--green); background: var(--green-soft); }
  .cu-sec { font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.05em; text-transform: uppercase;
            color: var(--muted); margin: 1.4rem 0 0.55rem; }
  .cu-crit { border: 1px solid var(--red); background: var(--red-soft); border-radius: 12px; overflow: hidden; }
  .cu-row { display: flex; gap: 0.6rem; align-items: baseline; padding: 0.5rem 0.8rem; border-bottom: 1px solid var(--line); }
  .cu-row:last-child { border-bottom: 0; }
  .cu-row .main { flex: 1; }
  .cu-row a { color: var(--ink); text-decoration: none; font-weight: 600; }
  .cu-row a:hover { text-decoration: underline; }
  .cu-row .why { display: block; color: var(--muted); font-size: 0.82rem; margin-top: 0.15rem; }
  .cu-chip { font-family: var(--mono); font-size: 0.58rem; text-transform: uppercase; padding: 0.15rem 0.45rem;
             border-radius: 999px; border: 1px solid var(--line); color: var(--muted); white-space: nowrap; }
  .cu-chip.pending, .cu-chip.changes_requested { border-color: var(--amber); color: var(--amber); }
  .cu-chip.rejected { border-color: var(--red); color: var(--red); }
  .cu-chip.approved { border-color: var(--green); color: var(--green-ink); }
  .cu-log { font-family: var(--mono); font-size: 0.75rem; }
  .cu-log .e { display: flex; gap: 0.7rem; padding: 0.28rem 0; color: var(--muted); }
  .cu-log .dt { min-width: 3.4rem; opacity: 0.75; }
</style>
</head>
<body>
<header>
  <div class="brand" onclick="location.href='/index.html'">📚 Librarian <span>decision library</span></div>
  <a href="/" style="font-family: var(--mono); font-size: 0.75rem; color: var(--muted); text-decoration: none;">← catchup</a>
  <input type="search" id="q" placeholder="Search every decision — including the rejected ones…">
  <div class="filters" id="filters"></div>
</header>
<main id="app"><p class="empty">Loading…</p></main>
<div class="chat">
  <div class="chips" id="chat-chips" hidden></div>
  <div class="row">
  <select id="chat-ctx" title="What this message is about"><option value="">about: this page</option></select>
  <input id="chat-in" type="text" placeholder="Select text in the doc, or paste a screenshot — then tell the agent…">
  <button id="chat-send">Send</button>
  <span class="st" id="chat-st"></span>
</div></div>

<script type="module">
const app = document.getElementById('app');
const qBox = document.getElementById('q');
const STATUSES = ['all', 'pending', 'approved', 'rejected'];
let filter = 'all';

const esc = (s) => String(s ?? '').replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

// What the chat bar attaches to every message: where the human is standing.
let pageCtx = { view: 'library' };

// A deliberately small markdown renderer: enough for decision docs, no dependency.
function md(src) {
  const blocks = [];
  let text = esc(src).replace(/```(\w*)\n([\s\S]*?)```/g, (_m, lang, code) => {
    // A mermaid fence is a diagram, not code: mermaid.run() reads the source
    // from the element and replaces it with SVG (ADR-009).
    blocks.push(
      lang === 'mermaid'
        ? `<pre class="mermaid">${code}</pre>`
        : `<pre><code>${code}</code></pre>`,
    );
    return `␀${blocks.length - 1}␀`;
  });

  // Pipe tables become real tables, before inline transforms touch the rows.
  text = text.replace(
    /(^|\n)(\|[^\n]+\|\n\|[ :\-|]+\|(?:\n\|[^\n]+\|)*)/g,
    (_m, lead, tbl) => {
      const rows = tbl.trim().split('\n').map((r) => r.replace(/^\||\|$/g, '').split('|').map((c) => inline(c.trim())));
      const [head, , ...body] = rows;
      const tr = (cells, tag) => `<tr>${cells.map((c) => `<${tag}>${c}</${tag}>`).join('')}</tr>`;
      blocks.push(`<div class="tbl"><table><thead>${tr(head, 'th')}</thead><tbody>${body.map((r) => tr(r, 'td')).join('')}</tbody></table></div>`);
      return `${lead}␀${blocks.length - 1}␀`;
    },
  );

  function inline(s) {
    return s
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/(?<![*\w])\*([^*\n]+)\*(?!\*)/g, '<em>$1</em>')
      .replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+|#[^)\s]*|\/[^)\s]*)\)/g, '<a href="$2">$1</a>');
  }

  // Markdown soft-wraps: an indented continuation line belongs to the list
  // item above it — merge before list conversion so bullets stay whole.
  text = text.replace(/\n[ \t]{2,}(?=\S)/g, ' ');

  text = inline(text
    .replace(/^### (.*)$/gm, '<h3>$1</h3>')
    .replace(/^## (.*)$/gm, '<h2>$1</h2>')
    .replace(/^# (.*)$/gm, '<h1>$1</h1>')
    .replace(/^(?:---+|\*\*\*+)$/gm, '<hr>')
    .replace(/^&gt; (.*)$/gm, (_m, q) => {
      // A quote led by a status emoji is a callout, not a citation.
      const cls = /^(⛔|🔴|❗)/.test(q) ? ' class="crit"' : /^⚠/.test(q) ? ' class="warn"' : /^(✅|✔)/.test(q) ? ' class="ok"' : '';
      return `<blockquote${cls}>${q}</blockquote>`;
    }))
    .replace(/^[-*] (.*)$/gm, '<li>$1</li>')
    .replace(/^\d+\. (.*)$/gm, '<oli>$1</oli>');

  // Numbered items keep their numbering: a decision's conditions are ordered.
  // Wrap <ul> runs while ordered items are still <oli>, so the lazy <li> match
  // cannot reach across an ordered block and swallow its numbering.
  text = text.replace(/(<oli>[\s\S]*?<\/oli>)(?=\n{2,}|$)/g, '<ol>$1</ol>');
  text = text.replace(/(<li>[\s\S]*?<\/li>)(?=\n{2,}|$)/g, '<ul>$1</ul>');
  text = text.replace(/<(\/?)oli>/g, '<$1li>');
  text = text
    .split(/\n{2,}/)
    .map((p) => (/^\s*<(h\d|ul|ol|pre|blockquote|table|div|hr)/.test(p.trim()) || /^␀\d+␀$/.test(p.trim()) ? p : `<p>${p.replace(/\n/g, ' ')}</p>`))
    .join('\n');

  return text.replace(/␀(\d+)␀/g, (m, i) => blocks[Number(i)] ?? m);
}

// Lazy mermaid (ADR-009): vendored + version-pinned — the review UI is the
// verdict surface, so it loads zero remote code. The script is fetched once,
// and only when a rendered doc actually contains a diagram. Any failure
// degrades to the source staying visible; a broken diagram never hides a doc.
let mermaidLoad;
async function renderDiagrams() {
  const nodes = document.querySelectorAll('pre.mermaid');
  if (!nodes.length) return;
  try {
    mermaidLoad ??= new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = '/vendor/mermaid.min.js';
      s.onload = resolve;
      s.onerror = reject;
      document.head.append(s);
    });
    await mermaidLoad;
    window.mermaid.initialize({
      startOnLoad: false,
      suppressErrorRendering: true,
      theme: matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'neutral',
    });
    await window.mermaid.run({ nodes });
  } catch {
    // Source stays in the pre block — readable, just not drawn.
  }
}

function statusChip(s) { return `<span class="chip ${s}">${s.replace('_', ' ')}</span>`; }
const when = (ts) => new Date(ts).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });

async function api(path, opts) {
  const res = await fetch(`/api${path}`, {
    headers: { 'content-type': 'application/json' },
    ...opts,
    body: opts?.body ? JSON.stringify(opts.body) : undefined,
  });
  return { status: res.status, body: await res.json().catch(() => ({})) };
}

function card(d) {
  return `<a class="card ${d.status}" href="/d/${d.id}" onclick="event.preventDefault(); route('/d/${d.id}')">
    <h3>${esc(d.title)}</h3>
    <div class="meta">
      ${statusChip(d.status)}
      <span class="chip">${esc(d.kind)}</span>
      <span>${esc(d.projectName ?? '')}</span>
      <span>· ${when(d.createdAt)}</span>
      ${d.versionCount > 1 ? `<span>· v${d.versionCount}</span>` : ''}
      ${d.source === 'watcher' ? '<span>· auto-captured</span>' : ''}
    </div>
    ${d.reason ? `<div class="reason">✕ ${esc(d.reason)}</div>` : ''}
  </a>`;
}

async function renderLibrary(project) {
  pageCtx = project ? { view: 'project', project } : { view: 'library' };
  const q = qBox.value.trim();
  const params = new URLSearchParams();
  if (q) params.set('q', q);
  if (project) params.set('project', project);
  // "pending" is a promise to the reviewer — everything still waiting on
  // someone. changes_requested is as unresolved as pending, so filter across
  // both client-side instead of matching one exact status server-side.
  if (filter === 'approved' || filter === 'rejected') params.set('status', filter);
  const { body } = await api(`/decisions?${params}`);
  let decisions = body.decisions ?? [];
  if (filter === 'pending') {
    decisions = decisions.filter((d) => d.status === 'pending' || d.status === 'changes_requested');
  }

  document.getElementById('filters').innerHTML = STATUSES
    .map((s) => `<button class="${s === filter ? 'on' : ''}" onclick="setFilter('${s}')">${s}</button>`)
    .join('');

  if (!decisions.length) {
    app.innerHTML = `<p class="empty">${q ? 'Nothing matches that.' : 'No decisions yet. Point an agent at the MCP endpoint and submit one.'}</p>`;
    return;
  }

  const needsYou = decisions.filter((d) => d.status === 'pending' || d.status === 'changes_requested');
  const rest = decisions.filter((d) => !needsYou.includes(d));

  // A project page is a mini-catchup: the numbers first, then the threads.
  // The strip only renders on the unfiltered view, where the numbers are true.
  const strip = project && !q && filter === 'all'
    ? (() => {
        const red = decisions.filter((d) => d.status === 'rejected');
        const last = decisions.length ? Math.max(...decisions.map((d) => d.createdAt)) : null;
        return `<div class="topline">
          <div class="stat ${needsYou.length ? 'hot' : ''}"><b>${needsYou.length}</b><small>needs you</small></div>
          <div class="stat ${red.length ? 'bad' : ''}"><b>${red.length}</b><small>red lights</small></div>
          <div class="stat"><b>${decisions.length}</b><small>decisions</small></div>
          ${last ? `<div class="stat"><b>${when(last)}</b><small>last activity</small></div>` : ''}
        </div>`;
      })()
    : '';

  app.innerHTML =
    (project ? `<div class="section-title">project catchup · ${esc(project)} — <a href="/index.html" style="color:inherit">all projects</a><button class="cu-go" data-p="${esc(project)}" onclick="catchup(this.dataset.p)">⚡ Catch me up</button></div>${strip}` : '') +
    (needsYou.length && !q ? `<div class="section-title">Needs you — ${needsYou.length}</div>${needsYou.map(card).join('')}` : '') +
    (rest.length ? `<div class="section-title">${q ? 'Results' : project ? `${esc(project)} — decisions` : 'Library'}</div>${rest.map(card).join('')}` : '') +
    (q && needsYou.length ? needsYou.map(card).join('') : '');
}

// The "Catch me up" button: ask THIS project's agent to write the briefing.
// The request routes to the project's own session (ADR-013); the agent grounds
// itself in the library, generates the catchup, and stores it via record_catchup
// — which pushes a live 'catchup' event that lands it on this page. A
// deterministic auto-summary stands in until the written one arrives.
let catchupWaiting = null; // { project, at, connected } while a request is in flight

window.catchup = (project) => {
  history.pushState({}, '', `/p/${encodeURIComponent(project)}?catchup=1`);
  requestCatchup(project);
};

async function requestCatchup(project) {
  catchupWaiting = { project, at: Date.now() };
  renderCatchup(project);
  const { status, body } = await api(`/projects/${encodeURIComponent(project)}/catchup/request`, {
    method: 'POST',
  });
  catchupWaiting = { project, at: Date.now(), connected: status === 200 ? body.connected : undefined };
  renderCatchup(project);
}

async function renderCatchup(project) {
  pageCtx = { view: 'catchup', project };
  if (!app.querySelector('.cu-head')) app.innerHTML = '<p class="empty">Loading…</p>';
  const [docRes, autoRes] = await Promise.all([
    api(`/projects/${encodeURIComponent(project)}/catchup-doc`),
    api(`/projects/${encodeURIComponent(project)}/catchup`),
  ]);
  const latest = docRes.body?.latest ?? null;
  const history = docRes.body?.history ?? [];
  const c = autoRes.body ?? {};
  const s = c.stats ?? { needsYou: 0, redLights: 0, bugs: 0, decisions: 0, lastActivity: null };

  // Clear the waiting flag once a written catchup newer than the request lands.
  if (latest && catchupWaiting?.project === project && latest.createdAt >= catchupWaiting.at) {
    catchupWaiting = null;
  }
  const waiting = catchupWaiting?.project === project;
  const banner = waiting
    ? `<div class="cu-now">${catchupWaiting.connected === false
        ? `⏳ <b>Parked</b> — no <code>${esc(project)}</code> session is connected. It generates the moment one is (the request is saved).`
        : `⏳ <b>Asked the ${esc(project)} agent</b> to write your catchup — it appears here when ready.`}</div>`
    : '';

  const item = (d) => `<div class="cu-row">
    <span class="cu-chip ${d.status}">${esc(d.status.replace('_', ' '))}</span>
    <div class="main"><a href="/d/${d.id}">${esc(d.title)}</a>${
      d.reason ? `<span class="why">✏️ ${esc(d.reason)}</span>` : d.tldr ? `<span class="why">${esc(d.tldr)}</span>` : ''
    }</div>
    <span class="cu-chip">${esc(d.kind)}</span>
  </div>`;

  const autoSummary =
    `${c.rightNow?.length ? `<div class="cu-sec">Right now — waiting on you</div>${c.rightNow.map(item).join('')}` : ''}` +
    `${c.critical?.length ? `<div class="cu-sec">🔴 Critical — red lights &amp; open bugs</div><div class="cu-crit">${c.critical.map(item).join('')}</div>` : ''}` +
    `${c.keyDecisions?.length ? `<div class="cu-sec">Key decisions &amp; why</div>${c.keyDecisions.map(item).join('')}` : ''}` +
    `${c.activity?.length ? `<div class="cu-sec">Activity</div><div class="cu-log">${c.activity.map((a) => `<div class="e"><span class="dt">${when(a.at)}</span><span>${esc(a.label)} · <a href="/d/${a.id}" style="color:inherit">${esc(a.title)}</a></span></div>`).join('')}</div>` : ''}`;

  const meta = latest
    ? `written ${new Date(latest.createdAt).toLocaleString()}${latest.generatedBy ? ` by ${esc(latest.generatedBy)}` : ''}${history.length > 1 ? ` · ${history.length} versions` : ''}`
    : 'no written catchup yet';

  app.innerHTML = `
    <div class="cu-head">
      <h1>${esc(project)} — catchup</h1>
      <span class="gen">${meta}</span>
      <span class="cu-actions">
        <button data-p="${esc(project)}" onclick="catchup(this.dataset.p)">⚡ ${latest ? 'regenerate' : 'generate'}</button>
        <button onclick="window.print()">⎙ save</button>
        <a href="/p/${encodeURIComponent(project)}">← decisions</a>
      </span>
    </div>
    ${banner}
    <div class="topline">
      <div class="stat ${s.needsYou ? 'hot' : ''}"><b>${s.needsYou}</b><small>needs you</small></div>
      <div class="stat ${s.redLights ? 'bad' : ''}"><b>${s.redLights}</b><small>red lights</small></div>
      ${s.bugs ? `<div class="stat bad"><b>${s.bugs}</b><small>bugs</small></div>` : ''}
      <div class="stat"><b>${s.decisions}</b><small>decisions</small></div>
      ${s.lastActivity ? `<div class="stat"><b>${when(s.lastActivity)}</b><small>last activity</small></div>` : ''}
    </div>
    ${latest
      ? `<div class="doc">${md(latest.bodyMd)}</div>`
      : `<div class="cu-sec">Auto-summary — click ⚡ for a written catchup from the agent</div>${autoSummary || '<p class="empty">Nothing recorded for this project yet.</p>'}`}
  `;
  if (latest) renderDiagrams();
}

async function renderDecision(id) {
  const { body: d, status } = await api(`/decisions/${id}`);
  if (status !== 200) { app.innerHTML = '<p class="empty">Not found.</p>'; return; }
  pageCtx = { view: 'decision', decisionId: id, title: d.title };

  const latest = d.versions[d.versions.length - 1];
  const pending = d.status === 'pending' || d.status === 'changes_requested';
  const lastReason = [...d.verdicts].reverse().find((v) => v.reason)?.reason;

  const banner = pending
    ? `<div class="banner ${d.status}">Awaiting your verdict — read it, then decide.</div>`
    : `<div class="banner ${d.status}">${d.status === 'approved' ? '✓ Approved' : d.status === 'rejected' ? '✕ Rejected' : d.status}${lastReason ? ` — ${esc(lastReason)}` : ''}</div>`;

  const versionTabs = d.versions.length > 1
    ? `<div class="versions">
        ${d.versions.map((v) => `<button class="${v.num === latest.num ? 'on' : ''}" onclick="showVersion('${id}', ${v.num})">v${v.num}</button>`).join('')}
        <button onclick="showDiff('${id}', ${d.versions.length - 1}, ${d.versions.length})">diff v${d.versions.length - 1}→v${d.versions.length}</button>
      </div>`
    : '';

  app.innerHTML = `
    <a class="back" href="/index.html">← library</a>
    <h1 style="font-family: var(--sans); margin: 0.6rem 0 0.3rem;">${esc(d.title)}</h1>
    <div class="meta" style="margin-bottom: 1rem;">
      ${statusChip(d.status)}<span class="chip">${esc(d.kind)}</span>
      <span>${esc(d.projectName)}</span><span>· ${when(d.createdAt)}</span>
      ${d.provenance?.map((p) => `<span>· via ${esc(p.source)}</span>`).join('') ?? ''}
    </div>
    ${banner}
    ${versionTabs}
    <div class="doc" id="doc">${md(latest.bodyMd)}</div>
    ${pending ? `
      <div class="actions">
        <button class="approve" onclick="verdict('${id}', 'approved')">Approve</button>
        <button class="reject" onclick="verdict('${id}', 'rejected')">Reject with reason</button>
        <button class="comment-btn" onclick="toggleComment()">Comment</button>
      </div>
      <div id="composer" hidden>
        <textarea id="cbody" placeholder="Select a passage above first to quote it, or just type…"></textarea>
        <div class="actions">
          <button class="comment-btn" onclick="submitComments('${id}')">Submit review — request changes</button>
        </div>
      </div>` : ''}
    ${renderThread(d)}
  `;
  renderDiagrams();
}

// The thread is grouped by the document it was said about: a comment on v1
// must not read as a comment on v4. Newest version's conversation first.
function renderThread(d) {
  if (!d.thread?.length) return '';
  const groups = new Map();
  for (const c of d.thread) {
    const num = c.onVersion ?? 0;
    if (!groups.has(num)) groups.set(num, []);
    groups.get(num).push(c);
  }
  return `<div class="thread"><div class="section-title">Thread — the rationale, by document</div>${[...groups.entries()]
    .sort((a, b) => b[0] - a[0])
    .map(([num, cs]) => `
      <div class="section-title" style="margin-top:0.9rem">${num ? `on v${num}${num === d.versions.length ? ' — current' : ''}` : 'general'}</div>
      ${cs.map((c) => `
      <div class="comment">
        <div class="who">${esc(c.author)} · ${when(c.createdAt)}</div>
        ${c.anchorQuote ? `<blockquote>${esc(c.anchorQuote)}</blockquote>` : ''}
        <div>${esc(c.body).replace(/\n/g, '<br>')}</div>
      </div>`).join('')}`)
    .join('')}</div>`;
}

window.showVersion = async (id, num) => {
  const { body: d } = await api(`/decisions/${id}`);
  const v = d.versions.find((x) => x.num === num);
  document.getElementById('doc').innerHTML = md(v.bodyMd);
  document.querySelectorAll('.versions button').forEach((b, i) => b.classList.toggle('on', i === num - 1));
  renderDiagrams();
};

window.showDiff = async (id, from, to) => {
  const { body } = await api(`/decisions/${id}/diff?from=${from}&to=${to}`);
  const html = (body.diff || 'No changes.')
    .split('\n')
    .map((l) => {
      const cls = l.startsWith('+') ? 'add' : l.startsWith('-') ? 'del' : l.startsWith('@@') ? 'hunk' : '';
      return `<span class="${cls}">${esc(l)}</span>`;
    })
    .join('\n');
  document.getElementById('doc').innerHTML = `<div class="diff">${html}</div>`;
};

window.verdict = async (id, to) => {
  let reason = null;
  if (to === 'rejected') {
    // A red light without a reason is not a decision — the API refuses it too.
    reason = prompt('Why is this rejected? The reason is the decision.');
    if (!reason?.trim()) return;
  }
  const res = await api(`/decisions/${id}/verdict`, { method: 'POST', body: { to, reason } });
  if (res.status !== 200) { alert(res.body.detail ?? 'Could not record that verdict.'); return; }
  renderDecision(id);
};

window.toggleComment = () => {
  const c = document.getElementById('composer');
  c.hidden = !c.hidden;
  if (!c.hidden) document.getElementById('cbody').focus();
};

window.submitComments = async (id) => {
  const body = document.getElementById('cbody').value.trim();
  if (!body) return;
  const quote = String(window.getSelection?.() ?? '').trim() || null;
  const res = await api(`/decisions/${id}/comments`, {
    method: 'POST',
    body: { comments: [{ body, anchor_quote: quote }], request_changes: true, reason: body.slice(0, 120) },
  });
  if (res.status !== 200) { alert(res.body.detail ?? 'Could not save that.'); return; }
  renderDecision(id);
};

window.setFilter = (s) => { filter = s; render(); };

window.route = (path) => {
  history.pushState({}, '', path);
  render();
};

function render() {
  const d = /^\/d\/(.+)$/.exec(location.pathname);
  if (d) { renderDecision(d[1]); return; }
  const p = /^\/p\/([^/]+)$/.exec(location.pathname);
  if (p) {
    const project = decodeURIComponent(p[1]);
    const cu = new URLSearchParams(location.search).get('catchup');
    // ?catchup=generate asks the agent (from the home card); rewrite to =1 so a
    // reload just views, never re-triggers generation.
    if (cu === 'generate') {
      history.replaceState({}, '', `/p/${encodeURIComponent(project)}?catchup=1`);
      requestCatchup(project);
      return;
    }
    if (cu) { renderCatchup(project); return; }
    renderLibrary(project);
    return;
  }
  renderLibrary();
}

qBox.addEventListener('input', () => { if (!location.pathname.startsWith('/d/')) render(); });
window.addEventListener('popstate', render);

// Live updates. On the library, any event re-renders the list. On a decision
// page, an event ABOUT THIS decision (a new comment, a verdict) re-renders the
// thread in place — so a reply appears without a manual reload — preserving
// scroll so the reader doesn't lose their place.
new EventSource('/api/events').addEventListener('message', (e) => {
  const onDecision = /^\/d\/(.+)$/.exec(location.pathname);
  if (!onDecision) { render(); return; }
  let ev = {};
  try { ev = JSON.parse(e.data); } catch { /* heartbeat / non-JSON */ }
  if (ev.decisionId === onDecision[1]) {
    const y = window.scrollY;
    renderDecision(onDecision[1]).then(() => window.scrollTo(0, y));
  }
});

// Chat bar: send a message to the agent. Context defaults to this page; the
// picker retargets it to any open review without navigating there.
const chatIn = document.getElementById('chat-in');
const chatSt = document.getElementById('chat-st');
const chatCtx = document.getElementById('chat-ctx');

// The draft belongs to the human, not the page lifecycle: it survives
// reloads, daemon restarts, and browser restarts until it is sent.
const DRAFT_KEY = `librarian.draft:${location.pathname}`;
try { chatIn.value = localStorage.getItem(DRAFT_KEY) ?? ''; } catch { /* private mode */ }
chatIn.addEventListener('input', () => {
  try { localStorage.setItem(DRAFT_KEY, chatIn.value); } catch { /* best effort */ }
});
async function loadCtxPicker() {
  const { body } = await api('/decisions');
  const open = (body.decisions ?? []).filter((d) => d.status === 'pending' || d.status === 'changes_requested');
  const keep = chatCtx.value;
  chatCtx.innerHTML = '<option value="">about: this page</option>' + open
    .map((d) => `<option value="${d.id}" data-title="${esc(d.title)}">about: ${esc(d.title.slice(0, 44))}…</option>`)
    .join('');
  if ([...chatCtx.options].some((o) => o.value === keep)) chatCtx.value = keep;
}
// ---- precise context: point at a passage, or paste a screenshot ----
// Both ride along with the next message so the agent knows exactly what the
// human means. A selection also becomes the stored comment's anchor quote.
let pickedQuote = null; // { text, section }
let pickedShot = null;  // { path, url }

function renderChips() {
  const box = document.getElementById('chat-chips');
  const out = [];
  if (pickedQuote) {
    // Keep the section label short: the passage is the useful half of the chip,
    // and a long heading would otherwise squeeze it out of view entirely.
    const s = pickedQuote.section;
    const label = s ? `§ ${s.length > 32 ? `${s.slice(0, 31)}…` : s}` : 'selection';
    const t = pickedQuote.text;
    out.push(`<span class="chip-ctx"><b>${esc(label)}</b><span class="q">“${esc(t.slice(0, 90))}${t.length > 90 ? '…' : ''}”</span><button title="drop" onclick="clearQuote()">✕</button></span>`);
  }
  if (pickedShot) {
    out.push(`<span class="chip-ctx"><img src="${pickedShot.url}" alt=""><b>screenshot</b><button title="drop" onclick="clearShot()">✕</button></span>`);
  }
  box.innerHTML = out.join('');
  box.hidden = !out.length;
}
window.clearQuote = () => { pickedQuote = null; renderChips(); };
window.clearShot = () => { pickedShot = null; renderChips(); };

// The nearest heading ABOVE the selection names the section it lives in.
function nearestHeading(el) {
  for (let n = el; n && n !== document.body; n = n.parentElement) {
    for (let p = n.previousElementSibling; p; p = p.previousElementSibling) {
      if (/^H[1-3]$/.test(p.tagName)) return p.textContent.trim().slice(0, 120);
    }
  }
  return '';
}

// Selecting text inside a rendered doc arms the next message with that passage.
document.addEventListener('mouseup', () => {
  const sel = window.getSelection();
  const text = String(sel ?? '').trim();
  if (!text) return; // a plain click never clears an armed quote
  const node = sel.anchorNode;
  const el = node?.nodeType === 1 ? node : node?.parentElement;
  if (!el?.closest?.('.doc')) return; // only selections inside a doc count
  pickedQuote = { text: text.slice(0, 1200), section: nearestHeading(el) };
  renderChips();
});

// Paste or drop a screenshot: upload it and keep the PATH — the agent reads
// the file itself, because the channel carries text only.
async function uploadShot(file) {
  if (!file || !file.type?.startsWith('image/')) return;
  chatSt.textContent = 'uploading…'; chatSt.className = 'st';
  const dataUrl = await new Promise((resolve) => {
    const fr = new FileReader();
    fr.onload = () => resolve(fr.result);
    fr.readAsDataURL(file);
  });
  const res = await api('/attachments', { method: 'POST', body: { dataUrl } });
  if (res.status === 200) {
    pickedShot = { path: res.body.path, url: res.body.url };
    chatSt.textContent = ''; renderChips();
  } else {
    chatSt.textContent = res.body?.error === 'too_large' ? 'image too large (5 MB)' : 'upload failed';
  }
}
chatIn.addEventListener('paste', (e) => {
  const item = [...(e.clipboardData?.items ?? [])].find((i) => i.type.startsWith('image/'));
  if (item) { e.preventDefault(); uploadShot(item.getAsFile()); }
});
const chatBar = document.querySelector('.chat');
chatBar.addEventListener('dragover', (e) => e.preventDefault());
chatBar.addEventListener('drop', (e) => { e.preventDefault(); uploadShot(e.dataTransfer?.files?.[0]); });

async function sendChat() {
  const body = chatIn.value.trim();
  if (!body) return;
  chatSt.textContent = 'sending…'; chatSt.className = 'st';
  const chosen = chatCtx.selectedOptions[0];
  const context = {
    page: location.pathname,
    ...pageCtx,
    ...(chatCtx.value ? { decisionId: chatCtx.value, title: chosen?.dataset.title ?? '' } : {}),
    ...(pickedQuote ? { quote: pickedQuote.text, section: pickedQuote.section } : {}),
    ...(pickedShot ? { attachment: pickedShot.path } : {}),
  };
  const res = await fetch('/api/messages', {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ body, context }),
  }).catch(() => null);
  if (res?.ok) {
    const out = await res.json().catch(() => ({}));
    chatIn.value = '';
    // The pointed-at context belongs to the message that just left.
    pickedQuote = null; pickedShot = null; renderChips();
    try { localStorage.removeItem(DRAFT_KEY); } catch { /* best effort */ }
    // Never claim delivery that didn't happen: a parked message is stored but
    // has no session bound to its project, and saying "sent" would be a lie.
    if (out.parked) {
      chatSt.textContent = `⏳ parked — no ${out.project ?? 'matching'} session`;
      chatSt.className = 'st warn';
      chatSt.title = 'Stored, not delivered. Bind a session to this project on the catchup page.';
    } else {
      chatSt.textContent = out.queued
        ? '✓ queued — agent busy'
        : out.persisted ? '✓ agent + thread' : '✓ sent to agent';
      chatSt.className = 'st ok';
    }
    if (out.persisted && location.pathname.startsWith('/d/')) render();
  } else { chatSt.textContent = 'failed — daemon up?'; }
  setTimeout(() => { chatSt.textContent = ''; }, 4000);
}
document.getElementById('chat-send').addEventListener('click', sendChat);
chatIn.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendChat(); });
loadCtxPicker();
new EventSource('/api/events').addEventListener('message', loadCtxPicker);

render();
</script>
</body>
</html>
